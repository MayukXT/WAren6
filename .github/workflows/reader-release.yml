name: Reader Release

on:
  push:
    tags:
      - "reader-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reader-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish Reader assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Reader version
        id: versions
        shell: pwsh
        run: |
          $packageVersion = (Get-Content .\waren6-reader\package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content .\waren6-reader\src-tauri\tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoSource = Get-Content .\waren6-reader\src-tauri\Cargo.toml -Raw
          $cargoVersion = [regex]::Match($cargoSource, '(?m)^version\s*=\s*"([^"]+)"').Groups[1].Value

          if (-not $packageVersion) { throw "waren6-reader/package.json does not define version" }
          if ($packageVersion -ne $tauriVersion -or $packageVersion -ne $cargoVersion) {
            throw "Reader version mismatch: package.json=$packageVersion tauri.conf.json=$tauriVersion Cargo.toml=$cargoVersion"
          }

          $version = $packageVersion
          $releaseTag = "reader-v$version"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne $releaseTag) {
            throw "Tag ${{ github.ref_name }} does not match Reader version; expected $releaseTag"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=reader-v$version" >> $env:GITHUB_OUTPUT

      - name: Validate updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for Tauri updater artifacts."
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required for this release key."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: waren6-reader/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: waren6-reader/src-tauri
          shared-key: windows-tauri-reader

      - name: Install reader dependencies
        working-directory: waren6-reader
        run: npm ci

      - name: Check reader release version
        working-directory: waren6-reader
        run: npm run check:release-version -- --tag ${{ steps.versions.outputs.release_tag }}

      - name: Run reader JavaScript tests
        working-directory: waren6-reader
        run: npm test

      - name: Run reader Rust tests
        working-directory: waren6-reader/src-tauri
        run: cargo test

      - name: Install Rust advisory scanner
        working-directory: waren6-reader/src-tauri
        run: cargo install cargo-audit --locked

      - name: Run Rust advisory audit
        working-directory: waren6-reader/src-tauri
        run: cargo audit

      - name: Build Windows reader
        working-directory: waren6-reader
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build

      - name: Stage Windows reader assets
        shell: pwsh
        run: |
          $version = "${{ steps.versions.outputs.version }}"
          $assetDir = "dist\reader"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          $portableSource = "waren6-reader\src-tauri\target\release\waren6-reader.exe"
          if (-not (Test-Path $portableSource)) {
            throw "Portable executable not found: $portableSource"
          }
          Copy-Item $portableSource (Join-Path $assetDir "WAren6-Reader-Portable-v$version.exe") -Force

          $bundleRoot = "waren6-reader\src-tauri\target\release\bundle"
          $setup = Get-ChildItem $bundleRoot -Recurse -File -Filter "*.exe" |
            Where-Object { $_.Name -like "*$version*" -and $_.Name -match "setup|installer|WAren6 Reader" } |
            Select-Object -First 1
          if (-not $setup) {
            throw "No Windows Reader setup executable was produced under $bundleRoot"
          }
          Copy-Item $setup.FullName (Join-Path $assetDir "WAren6-Reader-Setup-v$version.exe") -Force
          $setupSig = Get-Item "$($setup.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $setupSig) {
            throw "No Tauri updater signature was produced for $($setup.Name)"
          }
          Copy-Item $setupSig.FullName (Join-Path $assetDir "WAren6-Reader-Setup-v$version.exe.sig") -Force

          $msi = Get-ChildItem $bundleRoot -Recurse -File -Filter "*.msi" |
            Where-Object { $_.Name -like "*$version*" } |
            Select-Object -First 1
          if (-not $msi) {
            throw "No Windows Reader MSI was produced under $bundleRoot"
          }
          Copy-Item $msi.FullName (Join-Path $assetDir "WAren6-Reader-v$version-x64.msi") -Force
          $msiSig = Get-Item "$($msi.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $msiSig) {
            throw "No Tauri updater signature was produced for $($msi.Name)"
          }
          Copy-Item $msiSig.FullName (Join-Path $assetDir "WAren6-Reader-v$version-x64.msi.sig") -Force

      - name: Write Reader release metadata
        shell: pwsh
        run: |
          $version = "${{ steps.versions.outputs.version }}"
          $tag = "${{ steps.versions.outputs.release_tag }}"
          $releaseDir = "dist\release"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $setupName = "WAren6-Reader-Setup-v$version.exe"
          $msiName = "WAren6-Reader-v$version-x64.msi"
          $portableName = "WAren6-Reader-Portable-v$version.exe"
          $assetBase = "https://github.com/MayukXT/WAren6/releases/download/$tag"
          $releaseDate = (Get-Date).ToUniversalTime().ToString("o")
          $changelog = "WAren6 Reader v$version release."

          function New-ReleaseAsset($Name, $Path) {
            if (-not (Test-Path $Path)) { throw "Missing release asset: $Path" }
            $file = Get-Item $Path
            [ordered]@{
              name = $Name
              url = "$assetBase/$([uri]::EscapeDataString($Name))"
              sha256 = (Get-FileHash $Path -Algorithm SHA256).Hash.ToLowerInvariant()
              size = $file.Length
            }
          }

          $metadata = [ordered]@{
            schema = "waren6.reader.release.v1"
            version = $version
            tag = $tag
            release_date = $releaseDate
            release_url = "https://github.com/MayukXT/WAren6/releases/tag/$tag"
            changelog = $changelog
            assets = [ordered]@{
              reader_setup = New-ReleaseAsset $setupName "dist\reader\$setupName"
              reader_msi = New-ReleaseAsset $msiName "dist\reader\$msiName"
              reader_portable = New-ReleaseAsset $portableName "dist\reader\$portableName"
            }
          }
          $metadata | ConvertTo-Json -Depth 8 | Set-Content (Join-Path $releaseDir "WAren6-Reader-latest.json") -Encoding utf8

          $updaterMetadata = [ordered]@{
            version = $version
            notes = $changelog
            pub_date = $releaseDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = (Get-Content "dist\reader\$setupName.sig" -Raw).Trim()
                url = "$assetBase/$([uri]::EscapeDataString($setupName))"
              }
            }
          }
          $updaterMetadata | ConvertTo-Json -Depth 6 | Set-Content "dist\reader\latest.json" -Encoding utf8

          @"
          WAren6 Reader v$version

          Assets:
          - Reader installer: $setupName
          - Reader MSI: $msiName
          - Reader portable EXE: $portableName

          Installed Reader builds use latest.json through the Tauri updater.
          Portable Reader builds use WAren6-Reader-latest.json for manual replacement updates.
          "@ | Set-Content (Join-Path $releaseDir "release-notes.md") -Encoding utf8

      - name: Publish Reader release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $version = "${{ steps.versions.outputs.version }}"
          $tag = "${{ steps.versions.outputs.release_tag }}"
          $assets = @(
            "dist\reader\WAren6-Reader-Setup-v$version.exe",
            "dist\reader\WAren6-Reader-Setup-v$version.exe.sig",
            "dist\reader\WAren6-Reader-v$version-x64.msi",
            "dist\reader\WAren6-Reader-v$version-x64.msi.sig",
            "dist\reader\WAren6-Reader-Portable-v$version.exe",
            "dist\reader\latest.json",
            "dist\release\WAren6-Reader-latest.json"
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) { throw "Release asset missing: $asset" }
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --target $env:GITHUB_SHA --title "WAren6 Reader v$version" --notes-file "dist\release\release-notes.md"
          }

      - name: Publish reader-latest metadata branch
        shell: pwsh
        run: |
          $tag = "${{ steps.versions.outputs.release_tag }}"
          $metadataDir = Join-Path $env:RUNNER_TEMP "reader-latest"
          if (Test-Path $metadataDir) { Remove-Item -LiteralPath $metadataDir -Recurse -Force }
          New-Item -ItemType Directory -Path $metadataDir -Force | Out-Null

          Push-Location $metadataDir
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch origin reader-latest --depth=1
          if ($LASTEXITCODE -eq 0) {
            git checkout reader-latest
          } else {
            git checkout --orphan reader-latest
          }

          Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          Copy-Item "$env:GITHUB_WORKSPACE\dist\reader\latest.json" .\latest.json -Force
          Copy-Item "$env:GITHUB_WORKSPACE\dist\release\WAren6-Reader-latest.json" .\WAren6-Reader-latest.json -Force
          git add latest.json WAren6-Reader-latest.json
          if (git status --porcelain) {
            git commit -m "Update Reader latest metadata for $tag"
            git push origin HEAD:reader-latest --force
          }
          Pop-Location
